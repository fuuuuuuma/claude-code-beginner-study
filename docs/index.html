<blockquote>
<p>Claude Code 利用者・開発者の記事で <strong>「最も価値が高い」</strong> とよく挙げられるのが Gotchas<br />
（※ 公式必須項目ではなく、コミュニティで広く支持される実践知）</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>スキル実行 → AIがミス → 「なぜミスしたか」を1行追記 → 次回から出なくなる
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## Gotchas（字幕生成スキルの例）</span>
<span class="hljs-bullet">-</span> 5000文字超だと改行判断が荒くなる → 1000文字ずつ分割
<span class="hljs-bullet">-</span> 「えーと」「あのー」のフィラーを残す → 削除指示を明示
<span class="hljs-bullet">-</span> SRTのタイムコードがズレる → ffprobe で実尺を再計算
</code></pre>
<blockquote>
<p>最初から完璧に書く必要なし。<strong>1行ずつ追記</strong> で使うほど賢くなる</p>
</blockquote>

<h2 id="hitl%E3%81%A8%E3%81%AF--%E9%BB%84%E9%87%91%E5%BE%8B">HITLとは — 黄金律</h2>
<blockquote>
<p>AIが自動で動く流れの中に、<strong>人間が確認するタイミング</strong> を意図的に組み込む<br />

</blockquote>
<h3 id="%E9%BB%84%E9%87%91%E5%BE%8B">黄金律</h3>
<blockquote>
<p><strong>「取り消せないか？ 自分以外に影響が及ぶか？」</strong><br />
→ YES なら確認を入れる</p>
</blockquote>
<table>
<thead>
<tr>
<th></th>
<th>取り消せる</th>
<th>取り消せない</th>
</tr>
</thead>

<tr>
<td>影響小</td>
<td>自動でOK</td>
<td>確認推奨</td>
</tr>
<tr>
<td>影響大</td>
<td>確認推奨</td>
<td><strong>必ず確認（MUST）</strong></td>
</tr>
</tbody>
</table>

<table>
<thead>
<tr>
<th>ファイル</th>
<th>何を書くか</th>

<tbody>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># CLAUDE.md</span>
<span class="hljs-bullet">-</span> 取り消せない操作は必ず確認してから実行すること
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># agents/mailer.md</span>
<span class="hljs-bullet">-</span> 送信前に必ず内容を表示して「送信してよいですか？」と確認
